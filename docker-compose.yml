# MES Lite — full stack: SQL Server + ASP.NET Core API (with simulator) + React/nginx UI.
# Usage:  docker compose up --build
# Then open http://localhost:8088  (API/Swagger at http://localhost:5080/swagger)

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: meslite-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Your_strong_Pass123"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: meslite-api
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      Database__Provider: "SqlServer"
      ConnectionStrings__DefaultConnection: "Server=db;Database=MESLite;User Id=sa;Password=Your_strong_Pass123;TrustServerCertificate=True;Encrypt=False;MultipleActiveResultSets=True"
      Simulator__Enabled: "true"
    ports:
      - "5080:8080"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: meslite-web
    ports:
      - "8088:80"
    depends_on:
      - api

volumes:
  mssql-data:
